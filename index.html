<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أوقات الصلاة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #002366;
      color: #ffffff;
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      text-align: center;
      padding: 20px;
    }
    table {
      margin: 0 auto 30px auto;
      border-collapse: collapse;
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.08);
    }
    th, td {
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px;
    }
    .row {
      margin-bottom: 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }
    label {
      display: inline-block;
      min-width: 130px;
      margin-bottom: 5px;
      text-align: right;
    }
    input {
      padding: 6px 8px;
      margin-left: 10px;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    footer {
      margin-top: 40px;
    }
    .footer-content {
      margin-bottom: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <h2>أوقات الصلاة في مكة اليوم</h2>

  <table>
    <tr>
      <th>الصلاة</th>
      <th>الوقت</th>
    </tr>
    <tr><td>أذان الفجر</td><td id="fajrDisplay">...</td></tr>
    <tr><td>أذان الظهر</td><td id="dhuhrDisplay">...</td></tr>
    <tr><td>أذان العصر</td><td id="asrDisplay">...</td></tr>
    <tr><td>أذان المغرب</td><td id="maghribDisplay">...</td></tr>
    <tr><td>أذان العشاء</td><td id="ishaDisplay">...</td></tr>
  </table>

  <h2>أوقات الصلاة، والإقامة، ونهاية جماعة الصلاة</h2>

  <div class="row">
    <label for="fajrInput">أذان الفجر</label>
    <input type="time" id="fajrInput">
    <label for="fajrIqamah">إقامة صلاة الفجر</label>
    <input type="time" id="fajrIqamah" readonly>
    <label for="fajrEnd">نهاية صلاة الفجر مع الجماعة</label>
    <input type="time" id="fajrEnd" readonly>
  </div>

  <div class="row">
    <label for="dhuhrInput">أذان الظهر</label>
    <input type="time" id="dhuhrInput">
    <label for="dhuhrIqamah">إقامة صلاة الظهر</label>
    <input type="time" id="dhuhrIqamah" readonly>
    <label for="dhuhrEnd">نهاية صلاة الظهر مع الجماعة</label>
    <input type="time" id="dhuhrEnd" readonly>
  </div>

  <div class="row">
    <label for="asrInput">أذان العصر</label>
    <input type="time" id="asrInput">
    <label for="asrIqamah">إقامة صلاة العصر</label>
    <input type="time" id="asrIqamah" readonly>
    <label for="asrEnd">نهاية صلاة العصر مع الجماعة</label>
    <input type="time" id="asrEnd" readonly>
  </div>

  <div class="row">
    <label for="maghribInput">أذان المغرب</label>
    <input type="time" id="maghribInput">
    <label for="maghribIqamah">إقامة صلاة المغرب</label>
    <input type="time" id="maghribIqamah" readonly>
    <label for="maghribEnd">نهاية صلاة المغرب مع الجماعة</label>
    <input type="time" id="maghribEnd" readonly>
  </div>

  <div class="row">
    <label for="ishaInput">أذان العشاء</label>
    <input type="time" id="ishaInput">
    <label for="ishaIqamah">إقامة صلاة العشاء </label>
    <input type="time" id="ishaIqamah" readonly>
    <label for="ishaEnd">نهاية صلاة العشاء مع الجماعة</label>
    <input type="time" id="ishaEnd" readonly>
  </div>

  <button onclick="calculateTimes()">حساب الأوقات</button>

  <br><br><br>

  <footer>
    <div class="footer-content">
      <p>&copy; 2026 جميع الحقوق محفوظة</p>
      <h3>تصميم وتطوير</h3>
      <h3>مياداد حق</h3>
    </div>
    <img src="footer-iamge.jpg" alt="Footer image">
  </footer>

  <script>
    function addMinutes(timeValue, minutesToAdd) {
      if (!timeValue) return "";
      const [hours, minutes] = timeValue.split(":").map(Number);
      const totalMinutes = hours * 60 + minutes + minutesToAdd;
      const newHours = String(Math.floor(totalMinutes / 60) % 24).padStart(2, "0");
      const newMinutes = String(totalMinutes % 60).padStart(2, "0");
      return `${newHours}:${newMinutes}`;
    }

    function calculateTimes() {
      const fajr = document.getElementById("fajrInput").value;
      const dhuhr = document.getElementById("dhuhrInput").value;
      const asr = document.getElementById("asrInput").value;
      const maghrib = document.getElementById("maghribInput").value;
      const isha = document.getElementById("ishaInput").value;

      if (!fajr || !dhuhr || !asr || !maghrib || !isha) return;

      const fajrIqamah = addMinutes(fajr, 20);
      const dhuhrIqamah = addMinutes(dhuhr, 20);
      const asrIqamah = addMinutes(asr, 15);
      const maghribIqamah = addMinutes(maghrib, 10);
      const ishaIqamah = addMinutes(isha, 15);

      document.getElementById("fajrIqamah").value = fajrIqamah;
      document.getElementById("dhuhrIqamah").value = dhuhrIqamah;
      document.getElementById("asrIqamah").value = asrIqamah;
      document.getElementById("maghribIqamah").value = maghribIqamah;
      document.getElementById("ishaIqamah").value = ishaIqamah;

      document.getElementById("fajrEnd").value = addMinutes(fajrIqamah, 15);
      document.getElementById("dhuhrEnd").value = addMinutes(dhuhrIqamah, 12);
      document.getElementById("asrEnd").value = addMinutes(asrIqamah, 12);
      document.getElementById("maghribEnd").value = addMinutes(maghribIqamah, 10);
      document.getElementById("ishaEnd").value = addMinutes(ishaIqamah, 12);
    }

    async function loadPrayerTimes() {
      const url = "https://api.aladhan.com/v1/timingsByCity?city=Makkah&country=Saudi%20Arabia&method=4";

      try {
        const response = await fetch(url, { method: "GET" });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const json = await response.json();

        if (!json || !json.data || !json.data.timings) {
          throw new Error("Invalid API response");
        }

        const t = json.data.timings;

        const fajr = (t.Fajr || "").slice(0, 5);
        const dhuhr = (t.Dhuhr || "").slice(0, 5);
        const asr = (t.Asr || "").slice(0, 5);
        const maghrib = (t.Maghrib || "").slice(0, 5);
        const isha = (t.Isha || "").slice(0, 5);

        document.getElementById("fajrDisplay").textContent = fajr;
        document.getElementById("dhuhrDisplay").textContent = dhuhr;
        document.getElementById("asrDisplay").textContent = asr;
        document.getElementById("maghribDisplay").textContent = maghrib;
        document.getElementById("ishaDisplay").textContent = isha;

        document.getElementById("fajrInput").value = fajr;
        document.getElementById("dhuhrInput").value = dhuhr;
        document.getElementById("asrInput").value = asr;
        document.getElementById("maghribInput").value = maghrib;
        document.getElementById("ishaInput").value = isha;

        calculateTimes();
      } catch (e) {
        console.error("Prayer time load failed:", e);
        alert("تعذر تحميل أوقات الصلاة. افتح Console لمعرفة الخطأ.");
      }
    }

    document.addEventListener("DOMContentLoaded", loadPrayerTimes);
  </script>
</body>
</html>
