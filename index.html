<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أوقات الصلاة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #002366;
      color: #ffffff;
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      text-align: center;
      padding: 20px;
    }
    table {
      margin: 0 auto 30px auto;
      border-collapse: collapse;
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.08);
    }
    th, td {
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px;
    }
    .row {
      margin-bottom: 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }
    label {
      display: inline-block;
      min-width: 130px;
      margin-bottom: 5px;
      text-align: right;
    }
    input {
      padding: 6px 8px;
      margin-left: 10px;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    footer {
      margin-top: 40px;
    }
    .footer-content {
      margin-bottom: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <h2>أوقات الصلاة في مكة اليوم</h2>

  <table>
    <tr>
      <th>الصلاة</th>
      <th>الوقت</th>
    </tr>
    <tr>
      <td>أذان الفجر</td>
      <td id="fajrDisplay">...</td>
    </tr>
    <tr>
      <td>أذان الظهر</td>
      <td id="dhuhrDisplay">...</td>
    </tr>
    <tr>
      <td>أذان العصر</td>
      <td id="asrDisplay">...</td>
    </tr>
    <tr>
      <td>أذان المغرب</td>
      <td id="maghribDisplay">...</td>
    </tr>
    <tr>
      <td>أذان العشاء</td>
      <td id="ishaDisplay">...</td>
    </tr>
  </table>

  <h2>أوقات الصلاة، والإقامة، ونهاية جماعة الصلاة</h2>
  <h2> اضغط على حساب الأوقات</h2>

  <div class="row">
    <label for="fajrInput">أذان الفجر</label>
    <input type="time" id="fajrInput">
    <label for="fajrIqamah">وقت الإقامة</label>
    <input type="time" id="fajrIqamah" readonly>
    <label for="fajrEnd">نهاية الصلاة</label>
    <input type="time" id="fajrEnd" readonly>
  </div>

  <div class="row">
    <label for="dhuhrInput">أذان الظهر</label>
    <input type="time" id="dhuhrInput">
    <label for="dhuhrIqamah">وقت الإقامة</label>
    <input type="time" id="dhuhrIqamah" readonly>
    <label for="dhuhrEnd">نهاية الصلاة</label>
    <input type="time" id="dhuhrEnd" readonly>
  </div>

  <div class="row">
    <label for="asrInput">أذان العصر</label>
    <input type="time" id="asrInput">
    <label for="asrIqamah">وقت الإقامة</label>
    <input type="time" id="asrIqamah" readonly>
    <label for="asrEnd">نهاية الصلاة</label>
    <input type="time" id="asrEnd" readonly>
  </div>

  <div class="row">
    <label for="maghribInput">أذان المغرب</label>
    <input type="time" id="maghribInput">
    <label for="maghribIqamah">وقت الإقامة</label>
    <input type="time" id="maghribIqamah" readonly>
    <label for="maghribEnd">نهاية الصلاة</label>
    <input type="time" id="maghribEnd" readonly>
  </div>

  <div class="row">
    <label for="ishaInput">أذان العشاء</label>
    <input type="time" id="ishaInput">
    <label for="ishaIqamah">وقت الإقامة</label>
    <input type="time" id="ishaIqamah" readonly>
    <label for="ishaEnd">نهاية الصلاة</label>
    <input type="time" id="ishaEnd" readonly>
  </div>

  <button onclick="calculateTimes()">حساب الأوقات</button>

  <br><br><br>

  <footer>
    <div class="footer-content">
      <p>&copy; 2026 جميع الحقوق محفوظة</p>
      <h3>تصميم وتطوير</h3>
      <h3>مياداد حق</h3>
    </div>
    <img src="footer-iamge.jpg" alt="Footer image">
  </footer>

  <script>
    async function loadPrayerTimes() {
      const url = "https://api.aladhan.com/v1/timingsByCity?city=Makkah&country=Saudi%20Arabia&method=4";

      try {
        const response = await fetch(url);
        const json = await response.json();
        const t = json.data.timings;

        document.getElementById("fajrDisplay").textContent = t.Fajr;
        document.getElementById("dhuhrDisplay").textContent = t.Dhuhr;
        document.getElementById("asrDisplay").textContent = t.Asr;
        document.getElementById("maghribDisplay").textContent = t.Maghrib;
        document.getElementById("ishaDisplay").textContent = t.Isha;

        document.getElementById("fajrInput").value = t.Fajr;
        document.getElementById("dhuhrInput").value = t.Dhuhr;
        document.getElementById("asrInput").value = t.Asr;
        document.getElementById("maghribInput").value = t.Maghrib;
        document.getElementById("ishaInput").value = t.Isha;
      } catch (e) {
        alert("تعذر تحميل أوقات الصلاة");
        console.log(e);
      }
    }

    loadPrayerTimes();

    function addMinutes(timeValue, minutesToAdd) {
      if (!timeValue) return "";
      const [hours, minutes] = timeValue.split(":").map(Number);
      const totalMinutes = hours * 60 + minutes + minutesToAdd;
      const newHours = String(Math.floor(totalMinutes / 60) % 24).padStart(2, "0");
      const newMinutes = String(totalMinutes % 60).padStart(2, "0");
      return `${newHours}:${newMinutes}`;
    }

    function calculateTimes() {
      const fajr = document.getElementById("fajrInput").value;
      const dhuhr = document.getElementById("dhuhrInput").value;
      const asr = document.getElementById("asrInput").value;
      const maghrib = document.getElementById("maghribInput").value;
      const isha = document.getElementById("ishaInput").value;

      const fajrIqamahOffset = 20;
      const dhuhrIqamahOffset = 20;
      const asrIqamahOffset = 15;
      const maghribIqamahOffset = 10;
      const ishaIqamahOffset = 15;

      const fajrDuration = 15;
      const dhuhrDuration = 12;
      const asrDuration = 12;
      const maghribDuration = 10;
      const ishaDuration = 12;

      const fajrIqamah = addMinutes(fajr, fajrIqamahOffset);
      const dhuhrIqamah = addMinutes(dhuhr, dhuhrIqamahOffset);
      const asrIqamah = addMinutes(asr, asrIqamahOffset);
      const maghribIqamah = addMinutes(maghrib, maghribIqamahOffset);
      const ishaIqamah = addMinutes(isha, ishaIqamahOffset);

      const fajrEnd = addMinutes(fajrIqamah, fajrDuration);
      const dhuhrEnd = addMinutes(dhuhrIqamah, dhuhrDuration);
      const asrEnd = addMinutes(asrIqamah, asrDuration);
      const maghribEnd = addMinutes(maghribIqamah, maghribDuration);
      const ishaEnd = addMinutes(ishaIqamah, ishaDuration);

      document.getElementById("fajrIqamah").value = fajrIqamah;
      document.getElementById("dhuhrIqamah").value = dhuhrIqamah;
      document.getElementById("asrIqamah").value = asrIqamah;
      document.getElementById("maghribIqamah").value = maghribIqamah;
      document.getElementById("ishaIqamah").value = ishaIqamah;

      document.getElementById("fajrEnd").value = fajrEnd;
      document.getElementById("dhuhrEnd").value = dhuhrEnd;
      document.getElementById("asrEnd").value = asrEnd;
      document.getElementById("maghribEnd").value = maghribEnd;
      document.getElementById("ishaEnd").value = ishaEnd;
    }
  </script>
</body>
</html>
